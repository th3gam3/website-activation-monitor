<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Activation Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Website Activation Monitor</h1>
            <p class="subtitle">Monitoring: <a href="https://reservation.umai.io/en/widget/rembayung"
                    target="_blank" rel="noopener noreferrer">rembayung</a></p>
            <div id="live-clock" class="clock">
                <div class="clock-date">Monday, Jan 1, 2000</div>
                <div class="clock-time">00:00:00</div>
            </div>
        </header>

        <main>
            <div id="status-card" class="card loading">
                <div class="status-icon">
                    <div class="pulse-ring"></div>
                    <span id="icon">Checking...</span>
                </div>
                <h2 id="status-text">Initializing Monitor...</h2>
                <div class="details">
                    <p>HTTP Code: <span id="http-code">-</span></p>
                    <p>Final URL: <a id="final-url" href="#" target="_blank" rel="noopener noreferrer">-</a></p>
                    <p class="timestamp">Last Updated: <span id="last-updated">-</span></p>
                </div>
            </div>

            <section class="remote-control" aria-label="Remote control panel">
                <div class="rc-header">
                    <h3>Remote Control</h3>
                </div>
                <div class="rc-body">
                    <div class="rc-row">
                        <button id="btn-pause" class="rc-btn rc-btn-primary" aria-label="Pause or resume monitoring">
                            <span id="pause-icon">⏸</span>
                            <span id="pause-label">Pause</span>
                        </button>
                        <button id="btn-clear" class="rc-btn rc-btn-secondary" aria-label="Clear history">
                            🗑 Clear History
                        </button>
                    </div>
                    <div class="rc-row rc-row-wrap">
                        <label class="rc-label" for="interval-select">Poll Interval</label>
                        <div class="rc-interval-group" role="group" aria-label="Poll interval">
                            <button class="rc-interval-btn" data-ms="500">0.5s</button>
                            <button class="rc-interval-btn active" data-ms="1000">1s</button>
                            <button class="rc-interval-btn" data-ms="2000">2s</button>
                            <button class="rc-interval-btn" data-ms="5000">5s</button>
                            <button class="rc-interval-btn" data-ms="10000">10s</button>
                        </div>
                    </div>
                    <div class="rc-row">
                        <label class="rc-label" for="btn-sound">Sound Alert</label>
                        <button id="btn-sound" class="rc-toggle" role="switch" aria-checked="false" aria-label="Toggle sound alert on activation">
                            <span class="rc-toggle-thumb"></span>
                        </button>
                        <span id="sound-label" class="rc-toggle-label">Off</span>
                    </div>
                </div>
            </section>

            <section class="history" aria-label="Status history">
                <div class="history-header">
                    <h3>Status History</h3>
                    <p class="history-subtitle">Latest checks (newest first)</p>
                </div>
                <ul id="history-list" class="history-list"></ul>
            </section>
        </main>

        <footer>
            <p>Made by : IrSAR</p>
            <p>Auto-refreshing every 1 second</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
